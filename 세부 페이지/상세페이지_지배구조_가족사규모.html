<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>한맥가족 MIS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Noto Sans KR', 'Inter', ui-sans-serif, system-ui, sans-serif;
    background-color: #ECEAE4;
    color: #1F2937;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  button { font-family: inherit; cursor: pointer; border: none; background: none; }
  img { display: block; }

  #app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* Header */
  #header {
    width: 100%; height: 56px; flex-shrink: 0;
    background: linear-gradient(to right, #053b2a 0%, #0d543e 50%, #053b2a 100%);
    color: white; padding: 0 24px;
    display: flex; align-items: center; justify-content: space-between;
    position: relative; z-index: 20;
  }
  #header h1 { font-size: 19px; font-weight: 900; letter-spacing: -0.03em; color: white; }
  #header-center {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; align-items: center; height: 56px;
  }
  #header-center .curve { height: 56px; width: 80px; flex-shrink: 0; fill: #012116; }
  #header-tabs {
    height: 56px; background: #012116;
    display: flex; align-items: center; padding: 0 4px; gap: 10px;
  }
  .tab-btn {
    padding: 8px 20px; border-radius: 12px; font-size: 16px; font-weight: 900;
    letter-spacing: 0.02em; transition: all 0.15s; cursor: pointer;
    -webkit-text-stroke: 0.1px #000; text-shadow: 0 1px 1.5px rgba(0,0,0,0.8);
    border: 1px solid transparent;
  }
  .tab-btn.active {
    background: #01140c; color: white;
    border-color: #000a06;
    box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
  }
  .tab-btn:not(.active) {
    background: linear-gradient(to bottom, #256e57, #164d3c);
    color: #FAFAFA; border-color: #2a856a;
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .tab-btn:not(.active):hover { background: linear-gradient(to bottom, #2d7f65, #1b5c47); }
  #header-right { display: flex; align-items: center; gap: 16px; }
  #header-date { font-size: 14.5px; font-weight: 700; color: #80C9AD; letter-spacing: 0.05em; font-family: monospace; }
  .icon-btn {
    padding: 6px; background: #032E22; color: #80C9AD; border-radius: 4px;
    border: 1px solid #021F17; transition: background 0.15s; display: flex; align-items: center;
  }
  .icon-btn:hover { background: #044432; }
  .icon-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.5; }

  /* Summary Bar */
  #summary-bar { width: 100%; flex-shrink: 0; position: relative; z-index: 10; }
  #summary-top-line { width: 100%; height: 6px; background: #054E35; }
  #summary-kpi { width: 100%; background: #ECEAE4; padding: 8px 24px; }
  #summary-inner { width: 100%; height: 136px; display: flex; position: relative; }

  #left-section { width: 28%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; flex-shrink: 0; position: relative; }
  #left-divider { position: absolute; top: 8px; bottom: 12px; right: 45%; width: 1px; background: #C4C1B6; z-index: 10; }
  #left-labels { height: 54px; display: flex; align-items: center; }
  .left-label-1 { flex: 1; display: flex; align-items: center; padding-left: 24px; padding-right: 16px; }
  .left-label-2 { width: 45%; display: flex; align-items: center; padding-left: 24px; padding-right: 24px; }
  .kpi-label { font-size: 19px; font-weight: 700; color: #5A5C55; letter-spacing: -0.02em; }
  #left-values {
    height: 82px; background: linear-gradient(to right, #F0EDE6, #D5D0C5);
    border-bottom: 1.5px solid #A3A195;
    display: flex; align-items: center;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.05);
  }
  .val-box-1 { flex: 1; height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 16px; }
  .val-box-2 { width: 45%; height: 100%; display: flex; align-items: center; justify-content: flex-end; padding-right: 16px; }
  .kpi-num { font-size: 48px; font-weight: 900; color: #111; line-height: 1; letter-spacing: -0.03em; }
  .kpi-unit { font-size: 17px; font-weight: 900; color: #5A5C55; margin-left: 6px; }
  .val-align { display: flex; align-items: baseline; }

  #transition-svg { width: 80px; height: 100%; position: relative; flex-shrink: 0; margin-left: -1px; }
  #transition-svg svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }

  #right-section {
    flex: 1; height: 116px; margin-top: 20px;
    background: linear-gradient(to bottom, #FAF9F5, #ECEAE4);
    display: flex; align-items: center; position: relative;
  }
  #right-section::before {
    content: ''; position: absolute; top: -0.75px; left: 0; right: 0; height: 1.5px;
    background: linear-gradient(to right, #A3A195, rgba(196,193,182,0.3) 60%, transparent);
    pointer-events: none;
  }
  #sector-label { width: 128px; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; padding: 16px 8px 0 24px; flex-shrink: 0; }
  #sector-label span.main { font-size: 19px; font-weight: 700; color: #5A5C55; letter-spacing: -0.02em; line-height: 1.3; }
  #sector-label span.sub { font-size: 15px; font-weight: 500; color: #8A8C85; display: block; margin-top: 4px; }
  .separator-thick { width: 3px; height: 80px; background: #A3A195; flex-shrink: 0; align-self: center; }
  #sectors { flex: 1; height: 100%; display: flex; }
  .sector-btn {
    flex: 1; height: 100%; display: flex; flex-direction: column;
    justify-content: flex-start; padding: 16px 12px 0 20px;
    transition: all 0.2s; position: relative; text-align: left;
    outline: none; cursor: pointer; border: none; background: transparent;
  }
  .sector-btn:hover { background: rgba(234,229,220,0.5); }
  .sector-btn.selected { background: rgba(221,217,208,0.5); font-weight: 700; }
  .sector-btn.selected::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: #053F2E; }
  .sector-names { display: flex; flex-direction: column; font-size: 17px; font-weight: 500; text-transform: uppercase; letter-spacing: -0.03em; line-height: 1.3; margin-bottom: 8px; }
  .sector-count-row { display: flex; align-items: baseline; margin-top: auto; padding-bottom: 8px; align-self: flex-end; text-align: right; }
  .sector-count { font-size: 38px; font-weight: 900; color: #030712; line-height: 1; }
  .sector-unit { font-size: 15.5px; font-weight: 900; color: #6B7280; margin-left: 6px; white-space: nowrap; }
  .sector-ratio { font-size: 14px; font-weight: 500; color: #9CA3AF; margin-left: 4px; }
  .sector-sep { width: 1px; height: 48px; background: rgba(196,193,182,0.6); flex-shrink: 0; align-self: center; }
  #employee-section { width: 18%; height: 100%; display: flex; flex-direction: column; justify-content: flex-start; padding: 16px 16px 0 20px; flex-shrink: 0; }
  #employee-section .label { font-size: 19px; font-weight: 700; color: #5A5C55; letter-spacing: -0.02em; }
  #employee-val { display: flex; align-items: baseline; gap: 6px; margin-top: auto; padding-bottom: 8px; align-self: flex-end; }

  /* Main Body */
  #main-body { flex: 1; min-height: 0; width: 100%; padding: 40px 24px 24px; display: flex; gap: 16px; overflow: hidden; }

  /* Tab Content Panels */
  .tab-panel { flex: 1; min-height: 0; display: none; }
  .tab-panel.active { display: flex; }

  /* Chart Section */
  #chart-section {
    height: 100%; width: 29%; flex-shrink: 0; min-height: 0;
    background: rgba(234,232,227,0.4); border-radius: 2px;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: 16px; position: relative; overflow: hidden;
  }
  #chart-glow {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(circle 350px at 50% 80%, rgba(255,235,110,0.45) 0%, rgba(255,248,200,0.18) 45%, rgba(234,232,227,0) 80%),
      radial-gradient(circle 500px at 50% 50%, rgba(255,252,215,0.25) 0%, rgba(234,232,227,0) 100%);
  }
  #chart-spotlight {
    position: absolute; bottom: 64px; left: 50%; transform: translateX(-50%);
    width: 240px; height: 480px; pointer-events: none;
    background: linear-gradient(to top, rgba(255,253,235,0.42) 0%, rgba(255,255,255,0.12) 50%, rgba(255,255,255,0) 100%);
    clip-path: polygon(15% 100%, 85% 100%, 100% 0%, 0% 0%);
    filter: blur(28px); opacity: 0.9;
  }
  #chart-svg-wrap { position: absolute; inset: 0; width: 100%; height: 100%; display: flex; align-items: flex-start; justify-content: center; padding-top: 8px; }
  #cylinder-svg { width: 100%; max-width: 480px; height: 100%; z-index: 10; position: relative; }
  #chart-footer { z-index: 10; position: relative; }
  #chart-title { text-align: center; margin-top: 8px; margin-bottom: 4px; }
  #chart-title span { font-size: 20px; font-weight: 900; color: #053b2a; letter-spacing: -0.02em; }
  #chart-divider { width: 88%; margin: 8px auto 16px; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .chart-div-line1 { width: 100%; height: 1px; background: linear-gradient(to right, transparent, rgba(163,161,149,0.6), transparent); }
  .chart-div-line2 { width: 30%; height: 3px; background: linear-gradient(to right, transparent, rgba(5,59,42,0.7), transparent); border-radius: 9999px; }
  #pending-logos { z-index: 10; position: relative; display: flex; align-items: center; gap: 12px; padding: 0 4px; justify-content: center; }
  #pending-logos-inner { display: flex; align-items: center; gap: 14px; justify-content: center; }
  #pending-logos-inner img { height: 20px; object-fit: contain; opacity: 0.95; transition: opacity 0.15s; }
  #pending-logos-inner img:hover { opacity: 1; }
  #pending-label { font-size: 15px; font-weight: 900; color: #5A5C55; letter-spacing: -0.02em; white-space: nowrap; margin-left: 4px; }
  #chart-corner-icon { position: absolute; bottom: 16px; right: 4px; opacity: 0.1; pointer-events: none; }
  #chart-corner-icon svg { width: 32px; height: 32px; stroke: #5A5C55; fill: none; stroke-width: 1.2; }

  /* Grid */
  #grid-section { flex: 1; min-height: 0; height: 100%; overflow: visible; }
  #affiliate-grid { height: 100%; display: flex; flex-direction: column; min-height: 0; }
  #row1 { flex: 1; min-height: 0; display: flex; gap: 0; width: 100%; }
  #row2 { flex: 1; min-height: 0; display: grid; grid-template-columns: repeat(6, 1fr); gap: 0; }

  /* Company Card */
  .card {
    transition: all 0.2s; position: relative; overflow: hidden;
    min-width: 120px; border-radius: 8px; padding: 20px 20px 24px;
    display: flex; flex-direction: column; justify-content: space-between;
    border: 2px solid transparent;
  }
  .card:hover { z-index: 20; box-shadow: 0 10px 15px rgba(0,0,0,0.1); transform: scale(1.02); }
  .card-sector-label { position: absolute; top: 12px; right: 12px; z-index: 10; display: flex; flex-direction: column; align-items: flex-end; text-align: right; }
  .card-sector-label span { font-size: 18px; font-weight: 500; letter-spacing: -0.05em; line-height: 1.3; display: block; }
  .card-logo-area { flex: 1; display: flex; flex-direction: column; justify-content: center; margin-top: 20px; margin-bottom: 8px; }
  .card-logo-wrap { display: flex; align-items: center; margin-bottom: 12px; }
  .card-logo-wrap img { max-height: 40px; max-width: 100%; object-fit: contain; }
  .card-value-big { font-size: 48px; font-weight: 700; color: #030712; line-height: 1; letter-spacing: -0.03em; }
  .card-value-unit { font-size: 20px; font-weight: 700; color: #030712; margin-left: 4px; }
  .card-share { font-size: 17px; font-weight: 400; color: #9CA3AF; margin-top: 6px; line-height: 1; }
  .card-pending { font-size: 26px; font-weight: 500; color: #9CA3AF; letter-spacing: -0.02em; padding: 4px 0; }
  .card-table { border-top: 2px solid #D5D2CA; padding-top: 36px; display: flex; flex-direction: column; gap: 16px; margin-top: auto; }
  .card-row { display: flex; justify-content: space-between; align-items: center; }
  .card-row-label { font-size: 15.5px; font-weight: 400; color: #374151; white-space: nowrap; }
  .card-row-val { font-size: 18.5px; font-weight: 500; color: #030712; text-align: right; white-space: nowrap; }
  .card-row-val span { font-size: 14px; font-weight: 700; color: #374151; margin-left: 2px; }
  .card-row-pending { font-size: 18.5px; font-weight: 400; color: #9CA3AF; text-align: right; }

  .cylinder-slice { cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <header id="header">
    <!-- 상단 고정바 내용은 지우고 바 형태만 유지 -->
  </header>

  <!-- Summary Bar -->
  <div id="summary-bar">
    <div id="summary-top-line"></div>
    <div id="summary-kpi">
      <div id="summary-inner">
        <div id="left-section">
          <div id="left-divider"></div>
          <div id="left-labels">
            <div class="left-label-1"><span class="kpi-label">한맥가족 전체 가치</span></div>
            <div style="width:1px;flex-shrink:0"></div>
            <div class="left-label-2"><span class="kpi-label">가족사 수</span></div>
          </div>
          <div id="left-values">
            <div class="val-box-1"><div class="val-align"><span class="kpi-num">2,141.7</span><span class="kpi-unit">억원</span></div></div>
            <div style="width:1px;flex-shrink:0"></div>
            <div class="val-box-2"><div class="val-align"><span class="kpi-num">10</span><span class="kpi-unit">개사</span></div></div>
          </div>
        </div>
        <div id="transition-svg">
          <svg viewBox="0 0 80 136" preserveAspectRatio="none">
            <defs>
              <linearGradient id="rpg" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#FAF9F5"/>
                <stop offset="100%" stop-color="#ECEAE4"/>
              </linearGradient>
            </defs>
            <rect x="0" y="54" width="80" height="82" fill="#D5D0C5"/>
            <path d="M 0 136 C 35 136, 45 20, 80 20 L 80 136 L 0 136 Z" fill="url(#rpg)"/>
            <path d="M -10 135.25 L 0 135.25 C 35 135.25, 45 20, 80 20 L 95 20" fill="none" stroke="#A3A195" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div id="right-section">
          <div id="sector-label">
            <span class="main">가족사 구성 <span class="sub">(업종별)</span></span>
          </div>
          <div class="separator-thick"></div>
          <div id="sectors">
            <button class="sector-btn" data-sector="ENG. Business">
              <div class="sector-names"><span style="color:#7E532C">ENG. Business</span><span style="visibility:hidden;font-size:17px;line-height:1.3">x</span></div>
              <div class="sector-count-row"><span class="sector-count">3</span><span class="sector-unit">개사<span class="sector-ratio">(30%)</span></span></div>
            </button>
            <div class="sector-sep"></div>
            <button class="sector-btn" data-sector="IT Business">
              <div class="sector-names"><span style="color:#0C4CB0">IT Business</span><span style="visibility:hidden;font-size:17px;line-height:1.3">x</span></div>
              <div class="sector-count-row"><span class="sector-count">1</span><span class="sector-unit">개사<span class="sector-ratio">(10%)</span></span></div>
            </button>
            <div class="sector-sep"></div>
            <button class="sector-btn" data-sector="Manufacture &amp; Construction">
              <div class="sector-names"><span style="color:#1E73BE">Manufacture</span><span style="color:#1E73BE">&amp; Construction</span></div>
              <div class="sector-count-row"><span class="sector-count">5</span><span class="sector-unit">개사<span class="sector-ratio">(50%)</span></span></div>
            </button>
            <div class="sector-sep"></div>
            <button class="sector-btn" data-sector="Environment EPC &amp; Plant">
              <div class="sector-names"><span style="color:#4A5568">Environment EPC</span><span style="color:#4A5568">&amp; Plant</span></div>
              <div class="sector-count-row"><span class="sector-count">1</span><span class="sector-unit">개사<span class="sector-ratio">(10%)</span></span></div>
            </button>
          </div>
          <div class="separator-thick"></div>
          <div id="employee-section">
            <span class="label">전체 임직원 수</span>
            <div id="employee-val"><span class="kpi-num">2,890</span><span class="kpi-unit">명</span></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Main Body -->
  <main id="main-body">
    <!-- Chart Section -->
    <section id="chart-section">
      <div id="chart-glow"></div>
      <div id="chart-spotlight"></div>
      <div id="chart-svg-wrap">
        <!-- Background Grid -->
        <svg viewBox="0 0 340 600" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" preserveAspectRatio="xMidYMin slice">
          <defs>
            <radialGradient id="grid-radial-fade" cx="50%" cy="72%" r="48%">
              <stop offset="0%" stop-color="#73826D" stop-opacity="0.75"/>
              <stop offset="40%" stop-color="#73826D" stop-opacity="0.45"/>
              <stop offset="75%" stop-color="#73826D" stop-opacity="0.15"/>
              <stop offset="100%" stop-color="#73826D" stop-opacity="0"/>
            </radialGradient>
            <linearGradient id="horizon-glow" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#EAE8E3" stop-opacity="0"/>
              <stop offset="35%" stop-color="#C2CCBA" stop-opacity="0.35"/>
              <stop offset="50%" stop-color="#C2CCBA" stop-opacity="0.75"/>
              <stop offset="65%" stop-color="#C2CCBA" stop-opacity="0.35"/>
              <stop offset="100%" stop-color="#EAE8E3" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <g stroke="url(#grid-radial-fade)" stroke-width="0.65" fill="none">
            <line x1="-1000" y1="330" x2="1340" y2="330" stroke="url(#horizon-glow)" stroke-width="3"/>
            <line x1="-1000" y1="332" x2="1340" y2="332"/><line x1="-1000" y1="333" x2="1340" y2="333"/>
            <line x1="-1000" y1="335" x2="1340" y2="335"/><line x1="-1000" y1="338" x2="1340" y2="338"/>
            <line x1="-1000" y1="342" x2="1340" y2="342"/><line x1="-1000" y1="348" x2="1340" y2="348"/>
            <line x1="-1000" y1="356" x2="1340" y2="356"/><line x1="-1000" y1="367" x2="1340" y2="367"/>
            <line x1="-1000" y1="382" x2="1340" y2="382"/><line x1="-1000" y1="401" x2="1340" y2="401"/>
            <line x1="-1000" y1="424" x2="1340" y2="424"/><line x1="-1000" y1="442" x2="1340" y2="442"/>
            <line x1="-1000" y1="450" x2="1340" y2="450"/><line x1="-1000" y1="460" x2="1340" y2="460"/>
            <line x1="-1000" y1="473" x2="1340" y2="473"/><line x1="-1000" y1="488" x2="1340" y2="488"/>
            <line x1="-1000" y1="506" x2="1340" y2="506"/><line x1="-1000" y1="528" x2="1340" y2="528"/>
            <line x1="-1000" y1="554" x2="1340" y2="554"/><line x1="-1000" y1="585" x2="1340" y2="585"/>
            <line x1="-1000" y1="622" x2="1340" y2="622"/><line x1="-1000" y1="665" x2="1340" y2="665"/>
            <line x1="170" y1="330" x2="-230" y2="650"/><line x1="170" y1="330" x2="-180" y2="650"/>
            <line x1="170" y1="330" x2="-130" y2="650"/><line x1="170" y1="330" x2="-80" y2="650"/>
            <line x1="170" y1="330" x2="-30" y2="650"/><line x1="170" y1="330" x2="20" y2="650"/>
            <line x1="170" y1="330" x2="70" y2="650"/><line x1="170" y1="330" x2="120" y2="650"/>
            <line x1="170" y1="330" x2="170" y2="650"/><line x1="170" y1="330" x2="220" y2="650"/>
            <line x1="170" y1="330" x2="270" y2="650"/><line x1="170" y1="330" x2="320" y2="650"/>
            <line x1="170" y1="330" x2="370" y2="650"/><line x1="170" y1="330" x2="420" y2="650"/>
            <line x1="170" y1="330" x2="470" y2="650"/><line x1="170" y1="330" x2="520" y2="650"/>
            <line x1="170" y1="330" x2="570" y2="650"/>
            <ellipse cx="170" cy="440" rx="125" ry="42" stroke-dasharray="3 3"/>
            <ellipse cx="170" cy="440" rx="180" ry="60" stroke-dasharray="4 4"/>
            <ellipse cx="170" cy="440" rx="245" ry="82" stroke-dasharray="5 5"/>
            <ellipse cx="170" cy="440" rx="315" ry="105" stroke-dasharray="6 6"/>
          </g>
        </svg>
        <!-- Cylinder SVG -->
        <svg id="cylinder-svg" viewBox="0 0 340 600" preserveAspectRatio="xMidYMin slice">
          <defs>
            <linearGradient id="grad-saman" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#A34B00" stop-opacity="0.45"/>
              <stop offset="30%" stop-color="#F58220" stop-opacity="0.3"/>
              <stop offset="70%" stop-color="#FFB066" stop-opacity="0.2"/>
              <stop offset="100%" stop-color="#C45A00" stop-opacity="0.4"/>
            </linearGradient>

    var t1 = se('text',{x:cx-rx+10,y:textY,'text-anchor':'start',fill:'#000000',stroke:'#FFFFFF','stroke-width':'3.5','paint-order':'stroke','stroke-linejoin':'round'});
    t1.style.fontSize=s.nameFontSize; t1.style.fontFamily="'Noto Sans KR',sans-serif"; t1.style.fontWeight='900'; t1.style.letterSpacing='-0.03em';
    t1.textContent=s.name; g.appendChild(t1);

    var t2 = se('text',{x:cx+rx-10,y:textY,'text-anchor':'end',fill:s.textColor||'#000000',stroke:'#FFFFFF','stroke-width':'3.5','paint-order':'stroke','stroke-linejoin':'round'});
    t2.style.fontSize=s.ratioFontSize; t2.style.fontFamily="'Noto Sans KR',sans-serif"; t2.style.fontWeight='900'; t2.style.letterSpacing='-0.03em';
    t2.textContent=s.ratio; g.appendChild(t2);

    g.addEventListener('mouseenter', function(){ hoveredId=s.id; applyHighlight(); });
    g.addEventListener('mouseleave', function(){ hoveredId=null; applyHighlight(); });
    slicesG.appendChild(g);
  });
}

// ── Cards ──
function fmt1(n){ return new Intl.NumberFormat('ko-KR',{minimumFractionDigits:1,maximumFractionDigits:1}).format(n); }
function fmtInt(n){ return new Intl.NumberFormat('ko-KR').format(n); }

function sectorColor(ind){
  if(ind==='ENG. Business') return '#8B5A2B';
  if(ind==='IT Business') return '#0C4CB0';
  if(ind==='Manufacture & Construction') return '#1E73BE';
  if(ind==='Environment EPC & Plant') return '#4A5568';
  return '#9CA3AF';
}
function industryLines(ind){
  if(ind==='Manufacture & Construction') return ['Manufacture','& Construction'];
  if(ind==='Environment EPC & Plant') return ['Environment EPC','& Plant'];
  if(ind==='IT Business') return ['IT Business'];
  return ['ENG. Business'];
}
function cardBg(aff){
  if(aff.value===null) return 'linear-gradient(to bottom,#FFFFFF 0%,#E6F2FA 100%)';
  var m={saman:'#FFEDD9',hanmac:'#FFDFE3',jangheon_partners:'#E1EFF8',halla:'#E6ECEF',ptc:'#F0E1F5',baron:'#E1EFF8'};
  return 'linear-gradient(to bottom,#FFFFFF 0%,'+(m[aff.id]||'#FAFAFA')+' 100%)';
}

function createCard(aff) {
  var card = document.createElement('div');
  card.className='card';
  card.dataset.id=aff.id;
  card.style.border='2px solid '+aff.color+'24';
  card.style.background=cardBg(aff);

  // Sector label
  var sl=document.createElement('div'); sl.className='card-sector-label';
  industryLines(aff.industry).forEach(function(l){
    var sp=document.createElement('span'); sp.textContent=l; sp.style.color=sectorColor(aff.industry); sl.appendChild(sp);
  });
  card.appendChild(sl);

  // Logo area
  var la=document.createElement('div'); la.className='card-logo-area';
  var lw=document.createElement('div'); lw.className='card-logo-wrap';
  if(aff.ciImage && CI_IMAGES[aff.ciImage]){
    var img=document.createElement('img');
    img.src=CI_IMAGES[aff.ciImage]; img.alt=aff.name;
    img.style.maxHeight='40px'; img.style.maxWidth='100%'; img.style.objectFit='contain';
    if(aff.value===null) img.style.filter='grayscale(0.3) opacity(0.85)';
    lw.appendChild(img);
  }
  la.appendChild(lw);

  if(aff.value!==null){
    var vw=document.createElement('div'); vw.style.display='flex'; vw.style.flexDirection='column';
    var vr=document.createElement('div'); vr.style.display='flex'; vr.style.alignItems='baseline'; vr.style.gap='2px';
    var ns=document.createElement('span'); ns.className='card-value-big'; ns.textContent=fmt1(aff.value);
    var us=document.createElement('span'); us.className='card-value-unit'; us.textContent='억원';
    vr.appendChild(ns); vr.appendChild(us);
    var ss=document.createElement('span'); ss.className='card-share'; ss.textContent='('+aff.share+'%)';
    vw.appendChild(vr); vw.appendChild(ss); la.appendChild(vw);
  } else {
    var pd=document.createElement('div'); pd.style.padding='4px 0';
    var ps=document.createElement('span'); ps.className='card-pending'; ps.textContent='평가 전';
    pd.appendChild(ps); la.appendChild(pd);
  }
  card.appendChild(la);

  // Table
  var tbl=document.createElement('div'); tbl.className='card-table';
  var r1=document.createElement('div'); r1.className='card-row';
  var r1l=document.createElement('span'); r1l.className='card-row-label'; r1l.textContent='발행주식총수';
  var r1v=document.createElement('span'); r1v.className='card-row-val'; r1v.innerHTML=fmtInt(aff.issuedShares)+' <span>주</span>';
  r1.appendChild(r1l); r1.appendChild(r1v);
  var r2=document.createElement('div'); r2.className='card-row';
  var r2l=document.createElement('span'); r2l.className='card-row-label'; r2l.textContent='주당평가액';
  var r2v=document.createElement('span');
  if(aff.stockValue!==null){ r2v.className='card-row-val'; r2v.innerHTML=fmtInt(aff.stockValue)+' <span>원</span>'; }
  else { r2v.className='card-row-pending'; r2v.textContent='평가 전'; }
  r2.appendChild(r2l); r2.appendChild(r2v);
  tbl.appendChild(r1); tbl.appendChild(r2);
  card.appendChild(tbl);

  card.addEventListener('mouseenter', function(){ hoveredId=aff.id; applyHighlight(); });
  card.addEventListener('mouseleave', function(){ hoveredId=null; applyHighlight(); });
  return card;
}

function renderGrid(){
  var row1=document.getElementById('row1');
  var row2=document.getElementById('row2');
  row1.innerHTML=''; row2.innerHTML='';

  ['saman','hanmac','jangheon_partners','halla'].forEach(function(id){
    var aff=affiliatesData.find(function(a){return a.id===id;});
    var w=document.createElement('div'); w.style.height='100%';
    if(id==='saman'){w.style.flex='1.3';w.style.minWidth='0';}
    else if(id==='hanmac'){w.style.flex='1.1';w.style.minWidth='0';}
    else{w.style.flex='0.8';w.style.minWidth='0';}
    var c=createCard(aff); c.style.height='100%';
    w.appendChild(c); row1.appendChild(w);
  });

  ['ptc','baron','jangheon_ind','jangheon_corp','sanha','hyunta'].forEach(function(id){
    var aff=affiliatesData.find(function(a){return a.id===id;});
    var c=createCard(aff); c.style.height='100%';
    row2.appendChild(c);
  });
  applyHighlight();
}

function applyHighlight() {
  [].forEach.call(document.querySelectorAll('.card'), function(card) {
    var id = card.dataset.id;
    var aff = affiliatesData.find(function(a){ return a.id===id; });
    if(!aff) return;
    var isCH = hoveredId===id;
    card.style.opacity = '1';
    card.style.border = '2px solid '+(isCH ? aff.color : aff.color+'24');
    if(isCH){
      card.style.zIndex = '20';
      card.style.boxShadow = '0 16px 32px rgba(0,0,0,0.18), 0 0 0 3px '+aff.color+'80';
      card.style.transform = 'scale(1.04)';
    } else {
      card.style.zIndex = '';
      card.style.boxShadow = '';
      card.style.transform = '';
    }
  });
  [].forEach.call(document.querySelectorAll('.cylinder-slice'), function(g) {
    var id = g.dataset.id;
    var isH = hoveredId===id;
    var slice = slices.find(function(s){ return s.id===id; });
    g.style.opacity = isH ? '1' : '0.75';
    if(slice){
      var sc = isH ? '#FFFFFF' : slice.midColor;
      var sw = isH ? '2.0' : '1.2';
      var path = g.querySelector('path');
      var el = g.querySelector('ellipse');
      if(path){ path.setAttribute('stroke',sc); path.setAttribute('stroke-width',sw); }
      if(el){ el.setAttribute('stroke',sc); el.setAttribute('stroke-width',sw); }
    }
  });
}

// ── Tabs ──
var TAB_PANELS = { employees:'employees-panel', orders:'orders-panel', cashflow:'cashflow-panel' };
document.querySelectorAll('.tab-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    activeTab=btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.toggle('active',b.dataset.tab===activeTab); });
    var isGov=activeTab==='governance';
    document.getElementById('summary-bar').style.display=isGov?'':'none';
    document.getElementById('chart-section').style.display=isGov?'':'none';
    document.getElementById('grid-section').style.display=isGov?'':'none';
    Object.values(TAB_PANELS).forEach(function(id){ document.getElementById(id).classList.remove('active'); });
    if(!isGov && TAB_PANELS[activeTab]){ document.getElementById(TAB_PANELS[activeTab]).classList.add('active'); }
  });
});

// ── Sectors ──
document.querySelectorAll('.sector-btn').forEach(function(btn){
  btn.addEventListener('click', function(){
    var s=btn.dataset.sector;
    selectedSector = selectedSector===s ? null : s;
    document.querySelectorAll('.sector-btn').forEach(function(b){ b.classList.toggle('selected',b.dataset.sector===selectedSector); });
  });
});

// ── Pending logos CI images ──
['jangheon_ind','jangheon_corp','sanha','hyunta'].forEach(function(id){
  var el=document.getElementById('img-'+id);
  if(el && CI_IMAGES[id]) el.src=CI_IMAGES[id];
});

// ── Init ──
renderCylinder();
renderGrid();
</script>
